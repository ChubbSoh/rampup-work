<!DOCTYPE html>
<html>
<body>
  <!-- Static form definition for Netlify bot detection -->
  <form name="lead" netlify netlify-honeypot="bot-field" hidden>
    <input name="form-name" />
    <input name="bot-field" />
    <input name="name" />
    <input name="phone" />
    <input name="email" type="email" required />
    <input name="restaurant" />
    <input name="grab_revenue" />
    <input name="service" />
  </form>
</body>
</html>
